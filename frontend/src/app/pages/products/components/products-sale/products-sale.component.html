<div class="container-vender">
  <button class="vender-btn" (click)="open()">
  Vender
</button>
</div>

<app-sale-modal
  *ngIf="isOpen"
  (close)="close()"
  (success)="onSaleSuccess($event)">
</app-sale-modal>

<app-alert-modal
  *ngIf="showAlertModal"
  title="Venda concluída"
  [message]="'Valor total: ' + (saleTotal | currency:'BRL':'symbol':'1.2-2':'pt-BR')"
  (close)="closeAlert()"
></app-alert-modal>
