name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  backend-e2e:
    name: Backend E2E (optional)
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_DB_SSL: ${{ secrets.TEST_DB_SSL }}

    steps:
      - name: Skip e2e when TEST_DATABASE_URL is not configured
        if: ${{ env.TEST_DATABASE_URL == '' }}
        run: echo "TEST_DATABASE_URL not configured. Skipping e2e tests."

      - name: Checkout
        if: ${{ env.TEST_DATABASE_URL != '' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ env.TEST_DATABASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: ${{ env.TEST_DATABASE_URL != '' }}
        run: npm ci

      - name: Run e2e tests
        if: ${{ env.TEST_DATABASE_URL != '' }}
        run: npm run test:e2e

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          FRONTEND_API_URL: http://localhost:3000
          FRONTEND_API_URL_PROD: https://sistema-loja-fullstack.onrender.com
        run: npm run build
